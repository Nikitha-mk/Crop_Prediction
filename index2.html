<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crop Recommendation</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&family=Dancing+Script:wght@700&display=swap"
      rel="stylesheet"
    />

    <style>
      body {
        background-image: url("/static/bg2.jpg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        font-family: "Poppins", sans-serif;
        color: #fff;
      }

      header {
        background: rgba(255, 255, 255, 0.12);
        backdrop-filter: blur(8px);
        border-bottom: 1px solid rgba(255, 255, 255, 0.25);
        padding: 15px 0;
        text-align: center;
      }

      header h1 {
        font-family: "Dancing Script", cursive;
        color: #111d06;
        font-size: 45px;
        text-shadow: 1px 1px 6px rgba(0, 0, 0, 0.5);
      }

      .glass-box {
        background: rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(12px);
        border-radius: 20px;
        padding: 30px;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
        margin-top: 30px;
        border: 1px solid rgba(0, 0, 0, 0.3);
      }

      .glass-title {
        font-family: "Dancing Script", cursive;
        font-size: 35px;
        color: #111d06;
        text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.5);
      }

      input[type="text"] {
        border-radius: 12px;
        border: 1px solid rgba(0, 0, 0, 0.4);
        background: rgba(255, 255, 255, 0.2);
        color: #0e0d0d !important;
        padding: 12px;
        width: 100%;
        backdrop-filter: blur(4px);
      }

      input::placeholder {
        color: #1a1a1a;
      }

      .btn-custom {
        border-radius: 35px;
        padding: 12px 30px;
        font-weight: 600;
        transition: 0.3s;
        border: none;
        font-size: 18px;
      }

      .btn-success {
        background-color: rgba(46, 180, 60, 0.85);
      }

      .btn-success:hover {
        background-color: rgba(46, 180, 60, 1);
        transform: scale(1.05);
      }

      .btn-danger {
        background-color: rgba(200, 55, 55, 0.85);
      }

      .btn-danger:hover {
        background-color: rgba(200, 55, 55, 1);
        transform: scale(1.05);
      }

      .table {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(8px);
        border-radius: 15px;
        overflow: hidden;
        color: #fff;
        border: 1px solid rgba(0, 0, 0, 0.3);
      }

      .table td {
        padding: 15px;
        border: none;
        color: #1a1a1a;
        font-weight: 600;
      }

      .result-card {
        background: rgba(255, 255, 255, 0.18);
        backdrop-filter: blur(10px);
        border-radius: 20px;
        padding: 25px;
        margin-top: 35px;
        text-align: center;
        color: #1a1a1a;
        text-shadow: none;
        border: 1px solid rgba(0, 0, 0, 0.3);
      }

      .crop-img {
        width: 180px;
        height: 180px;
        border-radius: 20px;
        object-fit: cover;
        margin-bottom: 15px;
        box-shadow: 0 5px 25px rgba(0, 0, 0, 0.4);
      }
    </style>
  </head>

  <body>
    <header>
      <h1>🌾 ML-Based Crop Recommendation System 🌱</h1>
    </header>

    <div class="container col-md-6 glass-box">
      <h2 class="glass-title">Enter Soil & Weather Details</h2>
      <form id="crop-form" action="/predict" method="post">
        <table class="table">
          <tr>
            <td>N</td>
            <td>
              <input
                type="text"
                name="n"
                placeholder="Nitrogen value"
                required
              />
            </td>
          </tr>

          <tr>
            <td>P</td>
            <td>
              <input
                type="text"
                name="p"
                placeholder="Phosphorus value"
                required
              />
            </td>
          </tr>

          <tr>
            <td>K</td>
            <td>
              <input
                type="text"
                name="k"
                placeholder="Potassium value"
                required
              />
            </td>
          </tr>

          <tr>
            <td>Temperature</td>
            <td>
              <input
                type="text"
                name="temp"
                placeholder="Temperature (°C)"
                required
              />
            </td>
          </tr>

          <tr>
            <td>Humidity</td>
            <td>
              <input
                type="text"
                name="humidity"
                placeholder="Humidity (%)"
                required
              />
            </td>
          </tr>

          <tr>
            <td>pH</td>
            <td>
              <input
                type="text"
                name="ph"
                placeholder="Soil pH value"
                required
              />
            </td>
          </tr>

          <tr>
            <td>Rainfall</td>
            <td>
              <input
                type="text"
                name="rainfall"
                placeholder="Rainfall (mm)"
                required
              />
            </td>
          </tr>

          <tr>
            <td>
              <button
                type="reset"
                id="resetBtn"
                class="btn btn-danger btn-custom"
              >
                Reset
              </button>
            </td>
            <td>
              <button type="submit" class="btn btn-success btn-custom">
                Predict
              </button>
            </td>
          </tr>
        </table>
      </form>
    </div>

    {% if res %}
    <div class="container col-md-4 result-card">
      <img
        src="/static/crops/{{ res }}.jpg"
        class="crop-img"
        alt="Crop Image"
      />
      <h2>{{ res }}</h2>
      <p>This crop is highly recommended for your soil & climate conditions.</p>
    </div>
    {% endif %}

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const resetBtn = document.getElementById("resetBtn");
        resetBtn.addEventListener("click", () => {
          const resultCard = document.querySelector(".result-card");
          if (resultCard) resultCard.style.display = "none";
        });
      });
    </script>
  </body>
</html>
